<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>S.I.S - Student Indexing System (B-Tree)</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style_modern.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <aside class="app-sidebar">
            <div class="brand">
                <svg class="icon-brand" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <h1>SIS_CORE V3</h1>
            </div>

            <div class="sidebar-controls">
                <section class="card control-card">
                    <h3>
                        <svg class="icon-sm" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                        Thêm Sinh Viên
                    </h3>
                    <div class="input-form vertical-form">
                        <input type="text" id="inMssv" placeholder="MSSV (Tối đa 8 số)" maxlength="8" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <input type="text" id="inName" placeholder="Họ và tên">
                        <select id="inGender"><option value="Nam">Nam</option><option value="Nữ">Nữ</option></select>
                        <input type="text" id="inMajor" placeholder="Chuyên ngành (Tùy chọn)">
                        <button id="btnInsert" onclick="insertStudent()" class="btn-primary">INSERT</button>
                    </div>
                </section>

                <section class="card control-card">
                    <h3>
                        <svg class="icon-sm" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                        Thêm dữ liệu mẫu
                    </h3>
                    <div class="grid-2-btn">
                        <button onclick="addRandom(1)" class="btn-outline">1 Mẫu</button>
                        <button onclick="addRandom(10)" class="btn-outline">10 Mẫu</button>
                    </div>
                </section>

                <section class="card control-card">
                    <h3>
                        <svg class="icon-sm" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        Hành động nhanh
                    </h3>
                    <div class="action-inputs">
                        <input type="text" id="inSearchDelete" placeholder="Nhập MSSV..." maxlength="8" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <div class="grid-2-btn">
                            <button onclick="searchStudent()" class="btn-search">Tìm kiếm</button>
                            <button onclick="deleteStudent()" class="btn-danger">Xóa</button>
                        </div>
                    </div>
                </section>

                <button onclick="resetSystem()" class="btn-refresh btn-block">
                    <svg class="icon-sm" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                    Reset system
                </button>
            </div>
        </aside>

        <main class="app-main">
            <header class="app-header">
                <h2>Bảng Quan Sát</h2>
                <nav class="app-nav-tabs">
                    <button class="nav-tab" onclick="switchTab('tab-data')">
                        <svg class="icon-sm" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                        Records Table
                    </button>
                    <button class="nav-tab active" onclick="switchTab('tab-tree')">
                        <svg class="icon-sm" viewBox="0 0 24 24"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>
                        B - TREE
                    </button>
                </nav>
            </header>

            <div id="tab-data" class="tab-content">
                <section class="table-section card">
                    <div class="table-header">
                        <h3>
                            <svg class="icon-sm" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                            Danh sách sinh viên
                        </h3>
                        <span class="badge">Tổng cộng: <b id="totalCount">0</b></span>
                    </div>
                    <div class="table-container">
                        <table id="heapTable">
                            <thead><tr><th>MSSV</th><th>HỌ VÀ TÊN</th><th>GIỚI TÍNH</th><th>CHUYÊN NGÀNH</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </section>
            </div>

            <div id="tab-tree" class="tab-content active">
                <div class="visualizer-wrapper">
                    <div id="statusMsg" class="card" style="font-weight: 500; color: var(--primary);">
                        Ready to visualize
                    </div>

                    <div class="tree-controls card">
                        <div class="speed-slider-container" title="Điều chỉnh tốc độ Animation">
                            <svg class="icon-inline" viewBox="0 0 24 24" style="color:#7f8c8d; margin:0;"><polygon points="11 19 2 12 11 5 11 19"/><polygon points="22 19 13 12 22 5 22 19"/></svg>
                            <input type="range" id="speedSlider" min="1" max="10" value="6" oninput="updateSpeed(this.value)">
                            <svg class="icon-inline" viewBox="0 0 24 24" style="color:#7f8c8d; margin:0;"><polygon points="13 19 22 12 13 5 13 19"/><polygon points="2 19 11 12 2 5 2 19"/></svg>
                        </div>

                        <button onclick="togglePlay()" id="btnPlay" style="font-weight: bold; color: var(--primary);">
                            <svg class="icon-inline" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg> Bắt đầu
                        </button>

                        <span class="divider">|</span>

                        <button onclick="zoomTree(-0.1)" class="btn-icon" title="Thu nhỏ (Zoom Out)" style="color: #2c3e50;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0;">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                <line x1="8" y1="11" x2="14" y2="11"></line>
                            </svg>
                        </button>

                        <button onclick="zoomTree(0.1)" class="btn-icon" title="Phóng to (Zoom In)" style="color: #2c3e50;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0;">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                <line x1="11" y1="8" x2="11" y2="14"></line>
                                <line x1="8" y1="11" x2="14" y2="11"></line>
                            </svg>
                        </button>

                        <button onclick="autoFitTree()" class="btn-focus" title="Tự động thu phóng để nhìn thấy toàn bộ Cây">
                            <svg class="icon-inline" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg> FULL VIEW
                        </button>
                    </div>

                    <div class="legend-card card">
                        <div class="legend-item"><span class="legend-color color-active"></span> Đang duyệt / Di chuyển</div>
                        <div class="legend-item"><span class="legend-color color-warning"></span> Bị đầy / Sắp tách (Split)</div>
                        <div class="legend-item"><span class="legend-color color-success"></span> Hoàn tất thao tác</div>
                    </div>

                    <div class="card tree-card">
                        <div id="tree-container">
                            <svg id="svg-lines"></svg>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="{{ url_for('static', filename='script_modern.js') }}"></script>
</body>
</html>
